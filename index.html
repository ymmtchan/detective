  <!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bomb System</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <div class="message">
      ENTER CODE
    </div>

    <input type="text" id="codeInput">

    <button id="enterButton">ENTER</button>

    <div id="errorMessage">
      ERROR
    </div>

  </div>

  <div id="hackingScreen">

    <div class="hackingText">
    ACCESS GRANTED
    </div>
  
    <button id="okButton" style="display:none;">OK</button>

  </div>
  
  <div id="hackLines" style="display:none;">
   <div class="hackLine">ACCESSING...</div>
   <div class="hackLine">010101010101</div>
   <div class="hackLine">SECURITY CHECK...</div>
   <div class="hackLine">WARNING...</div>
  </div>
  
  <div id="noise"></div>
  
  <div id="bombScreen">
  
    <div class="timer" id="timer">
    05:00:00
    </div>

    <div class="message">
    ENTER CODE
    </div>

    <div class="cipherText">
    
    calculator<br>
    順に追え<br>
      <br>
    17964　17931　713　82　9713　9745413<br>
    </div>

    <input type="text" id="bombInput">

    <button id="bombButton">
    ENTER
    </button>
  
    <div id="errorText">
  ERROR
    </div>
  
  </div>

  <div id="successScreen">

    <div class="successText">
    SIGNAL LOST
    </div>

  </div>
  
  <div id="gameOverScreen">

    <div class="gameOverText">
    SYSTEM FAILURE
    </div>

  </div>

</div>
 
  <script src="script.js"></script>

</body>

</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
